<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Благодарим!</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ececec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background-color: #56d7b8;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Благодарим за поръчката!</h1>

        <p>Вашата заявка беше изпратена успешно.</p>

        <a href="index.html">Обратно към сайта</a>
    </div>

</body>

</html>
